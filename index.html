<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>モルックAR テスト</title>
<style>
  html, body {
    margin: 0; padding: 0; overflow: hidden;
    width: 100%; height: 100%;
    font-family: -apple-system, "Helvetica Neue", Arial, sans-serif;
    background: #111;
  }
  #overlay {
    position: fixed; top: 0; left: 0; width: 100%;
    z-index: 10; pointer-events: none;
    display: flex; flex-direction: column; align-items: center;
  }
  #status {
    margin-top: 16px;
    background: rgba(0,0,0,0.6);
    color: #fff;
    padding: 8px 16px;
    border-radius: 20px;
    font-size: 14px;
    text-align: center;
    max-width: 90%;
  }
  #score {
    margin-top: 10px;
    background: rgba(0,0,0,0.6);
    color: #ffd700;
    padding: 6px 14px;
    border-radius: 16px;
    font-size: 16px;
    font-weight: bold;
  }
  #startBtn {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    z-index: 20;
    background: #1a1a2e;
    color: #fff;
    border: none;
    font-size: 18px;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
  }
  #startBtn button {
    margin-top: 20px;
    padding: 14px 32px;
    font-size: 18px;
    border-radius: 30px;
    border: none;
    background: #4CAF50;
    color: white;
    pointer-events: auto;
  }
  #resetBtn {
    position: fixed; bottom: 24px; right: 16px;
    z-index: 15;
    padding: 10px 18px;
    border-radius: 20px;
    border: none;
    background: rgba(255,80,80,0.85);
    color: white;
    font-size: 14px;
    pointer-events: auto;
  }
  #unsupported {
    color: #ff6b6b;
    font-size: 13px;
    margin-top: 10px;
    max-width: 80%;
    text-align: center;
  }
</style>
</head>
<body>

<div id="startBtn">
  <div>モルックAR テスト</div>
  <div style="font-size:13px; opacity:0.7; margin-top:6px;">対応端末: Android Chrome (WebXR対応)</div>
  <button id="enterAR">ARを開始</button>
  <div id="unsupported"></div>
</div>

<div id="overlay">
  <div id="status">床をタップしてピンを配置してください</div>
  <div id="score">倒したピン: 0 / 12</div>
</div>

<button id="resetBtn" style="display:none;">リセット</button>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { ARButton } from 'three/addons/webxr/ARButton.js';

// ---------- 基本セットアップ ----------
let camera, scene, renderer;
let reticle; // 床検出用の照準
let hitTestSource = null;
let hitTestSourceRequested = false;

let pinsPlaced = false;
const pins = []; // {mesh, body:{pos, vel, angVel, knocked, baseQuat}}
const PIN_COUNT = 12;
const sticks = []; // 飛んでいる棒

let score = 0;
const statusEl = document.getElementById('status');
const scoreEl = document.getElementById('score');
const resetBtn = document.getElementById('resetBtn');

init();

function init() {
  scene = new THREE.Scene();

  camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.01, 20);

  const light = new THREE.HemisphereLight(0xffffff, 0x444444, 1.2);
  light.position.set(0.5, 1, 0.25);
  scene.add(light);
  const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
  dirLight.position.set(0, 3, 1);
  scene.add(dirLight);

  renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
  renderer.setPixelRatio(window.devicePixelRatio);
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.xr.enabled = true;
  document.body.appendChild(renderer.domElement);

  // 床検出の照準（リング）
  reticle = new THREE.Mesh(
    new THREE.RingGeometry(0.08, 0.1, 32).rotateX(-Math.PI / 2),
    new THREE.MeshBasicMaterial({ color: 0x00ff00 })
  );
  reticle.matrixAutoUpdate = false;
  reticle.visible = false;
  scene.add(reticle);

  // ---- ARボタン設定 ----
  const sessionInit = {
    requiredFeatures: ['hit-test'],
    optionalFeatures: ['dom-overlay'],
    domOverlay: { root: document.body }
  };

  document.getElementById('enterAR').addEventListener('click', () => {
    if (!navigator.xr) {
      document.getElementById('unsupported').textContent =
        'このブラウザはWebXRに対応していません。Android Chromeでお試しください。';
      return;
    }
    navigator.xr.isSessionSupported('immersive-ar').then((supported) => {
      if (!supported) {
        document.getElementById('unsupported').textContent =
          'この端末はARモードに対応していません。';
        return;
      }
      const arButton = ARButton.createButton(renderer, sessionInit);
      arButton.style.display = 'none';
      document.body.appendChild(arButton);
      arButton.click();
      document.getElementById('startBtn').style.display = 'none';
      resetBtn.style.display = 'block';
    });
  });

  renderer.xr.addEventListener('sessionstart', onSessionStart);
  renderer.xr.addEventListener('sessionend', onSessionEnd);

  window.addEventListener('resize', onWindowResize);

  resetBtn.addEventListener('click', resetGame);

  // タップでピン配置
  const controller = renderer.xr.getController(0);
  controller.addEventListener('select', onSelect);
  scene.add(controller);

  renderer.setAnimationLoop(render);
}

function onWindowResize() {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
}

function onSessionStart() {
  statusEl.textContent = '床にカメラを向けてタップ → ピンを配置';
  setupMotionListener();
}

function onSessionEnd() {
  resetBtn.style.display = 'none';
  document.getElementById('startBtn').style.display = 'flex';
}

// ---------- ピン配置 ----------
function onSelect() {
  if (pinsPlaced) return;
  if (reticle.visible) {
    placePins(reticle.matrix);
  }
}

function placePins(matrix) {
  const pos = new THREE.Vector3();
  const quat = new THREE.Quaternion();
  const scale = new THREE.Vector3();
  matrix.decompose(pos, quat, scale);

  // モルックの三角配置（4-3-2-1 簡易版、12本）
  const rows = [4, 3, 2, 1, 1, 1]; // 簡易: 12本になるよう調整
  // 正式は1-12番ピンだが、ここではシンプルに三角形配置
  const spacing = 0.09;
  let index = 0;
  const layout = [];
  // 三角形に12本並べる (4,3,2,2,1 のような簡易グリッド)
  const rowCounts = [4, 3, 2, 2, 1];
  for (let r = 0; r < rowCounts.length; r++) {
    const count = rowCounts[r];
    const rowOffset = -(count - 1) * spacing * 0.5;
    for (let c = 0; c < count; c++) {
      layout.push({
        x: rowOffset + c * spacing,
        z: -r * spacing * 0.9
      });
      index++;
    }
  }

  layout.forEach((p, i) => {
    const pin = createPinMesh();
    const localPos = new THREE.Vector3(p.x, 0, p.z);
    localPos.applyQuaternion(quat);
    localPos.add(pos);
    pin.position.copy(localPos);
    pin.quaternion.copy(quat);
    pin.userData.basePosition = localPos.clone();
    pin.userData.baseQuaternion = quat.clone();
    pin.userData.knocked = false;
    pin.userData.angVel = new THREE.Vector3();
    pin.userData.linVel = new THREE.Vector3();
    scene.add(pin);
    pins.push(pin);
  });

  pinsPlaced = true;
  reticle.visible = false;
  statusEl.textContent = 'スマホを振って棒を投げよう！';
}

function createPinMesh() {
  const group = new THREE.Group();
  const bodyGeo = new THREE.CylinderGeometry(0.018, 0.022, 0.14, 12);
  const bodyMat = new THREE.MeshStandardMaterial({ color: 0xe8d9b5 });
  const body = new THREE.Mesh(bodyGeo, bodyMat);
  body.position.y = 0.07;
  group.add(body);

  // 番号風の赤い帯
  const bandGeo = new THREE.CylinderGeometry(0.0225, 0.0225, 0.015, 12);
  const bandMat = new THREE.MeshStandardMaterial({ color: 0xd23c3c });
  const band = new THREE.Mesh(bandGeo, bandMat);
  band.position.y = 0.11;
  group.add(band);

  return group;
}

// ---------- 加速度センサーで棒を投げる ----------
let lastAccelMagnitude = 0;
let lastThrowTime = 0;
const THROW_COOLDOWN = 700; // ms
const SWING_THRESHOLD = 14; // m/s^2 の変化量しきい値（要調整）

function setupMotionListener() {
  function handleMotion(event) {
    const acc = event.accelerationIncludingGravity || event.acceleration;
    if (!acc) return;
    const mag = Math.sqrt(
      (acc.x || 0) ** 2 + (acc.y || 0) ** 2 + (acc.z || 0) ** 2
    );
    const delta = mag - lastAccelMagnitude;
    lastAccelMagnitude = mag;

    const now = performance.now();
    if (delta > SWING_THRESHOLD && pinsPlaced && now - lastThrowTime > THROW_COOLDOWN) {
      lastThrowTime = now;
      const power = Math.min(delta / 25, 1.5); // 強弱を0~1.5にマッピング
      throwStick(power);
    }
  }

  if (typeof DeviceMotionEvent !== 'undefined' &&
      typeof DeviceMotionEvent.requestPermission === 'function') {
    // iOS Safari対応（念のため）
    DeviceMotionEvent.requestPermission().then((res) => {
      if (res === 'granted') {
        window.addEventListener('devicemotion', handleMotion);
      }
    }).catch(() => {});
  } else {
    // Android Chromeはそのまま使える
    window.addEventListener('devicemotion', handleMotion);
  }
}

function throwStick(power) {
  const stickGeo = new THREE.CylinderGeometry(0.012, 0.012, 0.28, 8);
  const stickMat = new THREE.MeshStandardMaterial({ color: 0x8a5a2b });
  const stick = new THREE.Mesh(stickGeo, stickMat);

  // カメラ位置・向きから発射
  const camPos = new THREE.Vector3();
  const camDir = new THREE.Vector3();
  camera.getWorldPosition(camPos);
  camera.getWorldDirection(camDir);

  stick.position.copy(camPos).add(camDir.clone().multiplyScalar(0.3));
  stick.quaternion.copy(camera.quaternion);
  stick.rotateX(Math.PI / 2); // 円柱を横向きに

  const speed = 2.0 + power * 3.0; // 強弱を初速に反映
  const velocity = camDir.clone().multiplyScalar(speed);
  velocity.y += 0.3; // 軽い放物線

  stick.userData.velocity = velocity;
  stick.userData.gravity = -2.2;
  stick.userData.life = 3.0; // 秒

  scene.add(stick);
  sticks.push(stick);

  statusEl.textContent = `投げた！ 強さ: ${(power * 100 / 1.5).toFixed(0)}%`;
}

// ---------- シンプルな衝突・転倒判定 ----------
const PIN_RADIUS = 0.03;
const KNOCK_IMPULSE_THRESHOLD = 1.2; // この速さ以上の衝突で倒れる

function updateSticksAndCollisions(dt) {
  for (let i = sticks.length - 1; i >= 0; i--) {
    const s = sticks[i];
    s.userData.life -= dt;
    s.userData.velocity.y += s.userData.gravity * dt;
    s.position.addScaledVector(s.userData.velocity, dt);

    // ピンとの当たり判定（簡易：距離ベース）
    for (const pin of pins) {
      if (pin.userData.knocked) continue;
      const d = s.position.distanceTo(pin.position.clone().setY(pin.position.y + 0.06));
      if (d < PIN_RADIUS + 0.04) {
        const speed = s.userData.velocity.length();
        if (speed > KNOCK_IMPULSE_THRESHOLD * 0.3) {
          knockPin(pin, s.userData.velocity);
        }
      }
    }

    if (s.userData.life <= 0 || s.position.y < -2) {
      scene.remove(s);
      sticks.splice(i, 1);
    }
  }

  // 倒れたピンのアニメーション（簡易物理）
  for (const pin of pins) {
    if (!pin.userData.knocked) continue;
    if (pin.userData.fallProgress === undefined) pin.userData.fallProgress = 0;
    if (pin.userData.fallProgress < 1) {
      pin.userData.fallProgress = Math.min(1, pin.userData.fallProgress + dt * 4);
      const t = pin.userData.fallProgress;
      pin.quaternion.copy(pin.userData.baseQuaternion).multiply(
        new THREE.Quaternion().setFromAxisAngle(
          pin.userData.fallAxis, t * Math.PI / 2
        )
      );
      pin.position.y = pin.userData.basePosition.y - t * 0.04;
    }
  }
}

function knockPin(pin, velocity) {
  pin.userData.knocked = true;
  pin.userData.fallAxis = new THREE.Vector3(velocity.z, 0, -velocity.x).normalize();
  if (pin.userData.fallAxis.lengthSq() === 0) {
    pin.userData.fallAxis.set(1, 0, 0);
  }
  score++;
  scoreEl.textContent = `倒したピン: ${score} / ${PIN_COUNT}`;
  if (score >= PIN_COUNT) {
    statusEl.textContent = '🎉 全部倒した！リセットでもう一度';
  } else {
    statusEl.textContent = 'ナイス！次も投げてみよう';
  }
}

// ---------- リセット ----------
function resetGame() {
  pins.forEach(p => scene.remove(p));
  pins.length = 0;
  sticks.forEach(s => scene.remove(s));
  sticks.length = 0;
  pinsPlaced = false;
  score = 0;
  scoreEl.textContent = `倒したピン: 0 / ${PIN_COUNT}`;
  statusEl.textContent = '床をタップしてピンを配置してください';
}

// ---------- レンダーループ ----------
const clock = new THREE.Clock();

function render(timestamp, frame) {
  const dt = Math.min(clock.getDelta(), 0.05);

  if (frame) {
    const referenceSpace = renderer.xr.getReferenceSpace();
    const session = renderer.xr.getSession();

    if (!hitTestSourceRequested) {
      session.requestReferenceSpace('viewer').then((refSpace) => {
        session.requestHitTestSource({ space: refSpace }).then((source) => {
          hitTestSource = source;
        });
      });
      session.addEventListener('end', () => {
        hitTestSourceRequested = false;
        hitTestSource = null;
      });
      hitTestSourceRequested = true;
    }

    if (hitTestSource && !pinsPlaced) {
      const hitTestResults = frame.getHitTestResults(hitTestSource);
      if (hitTestResults.length > 0) {
        const hit = hitTestResults[0];
        const pose = hit.getPose(referenceSpace);
        reticle.visible = true;
        reticle.matrix.fromArray(pose.transform.matrix);
      } else {
        reticle.visible = false;
      }
    }
  }

  updateSticksAndCollisions(dt);

  renderer.render(scene, camera);
}
</script>
</body>
</html>
